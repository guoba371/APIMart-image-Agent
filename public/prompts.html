<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seedance 2.0 提示词工具</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #050505;
        --paper: #fffdf6;
        --soft: #f5f1e7;
        --line: #050505;
        --muted: #5d5d55;
        --pink: #ff616d;
        --yellow: #ffe04f;
        --cyan: #52d1d1;
        --green: #83d783;
        --purple: #b9a7ff;
        --orange: #ff914d;
        --shadow: 6px 6px 0 #050505;
        --shadow-sm: 4px 4px 0 #050505;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: "Arial Black", "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
        background: var(--paper);
        letter-spacing: 0;
      }

      button,
      textarea,
      input,
      select {
        font: inherit;
      }

      button,
      a.button {
        min-height: 42px;
        border: 3px solid var(--line);
        background: #fff;
        color: var(--ink);
        box-shadow: var(--shadow-sm);
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0 18px;
        font-weight: 950;
      }

      button:hover,
      a.button:hover {
        transform: translate(-1px, -1px);
        box-shadow: 6px 6px 0 #050505;
      }

      button.primary {
        background: #050505;
        color: #fff;
      }

      button.yellow {
        background: var(--yellow);
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px clamp(14px, 3vw, 36px);
        border-bottom: 4px solid var(--line);
        background: rgba(255, 253, 246, 0.88);
        backdrop-filter: blur(12px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 3px solid var(--line);
        background: #fff;
        padding: 8px 14px;
        box-shadow: var(--shadow-sm);
        font-size: 18px;
        font-weight: 950;
      }

      .brand-mark {
        width: 28px;
        height: 18px;
        border: 4px solid var(--line);
        border-left-width: 10px;
        border-radius: 14px 14px 4px 4px;
      }

      .nav-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .hero {
        min-height: 620px;
        padding: 64px clamp(18px, 4vw, 64px) 52px;
        background:
          radial-gradient(circle at 16% 22%, rgba(255, 145, 77, 0.78), transparent 26%),
          radial-gradient(circle at 28% 70%, rgba(255, 224, 79, 0.9), transparent 28%),
          radial-gradient(circle at 66% 40%, rgba(82, 209, 209, 0.78), transparent 34%),
          linear-gradient(120deg, #ff8759 0%, #ffe04f 30%, #62d3bf 62%, #b9a7ff 100%);
        border-bottom: 5px solid var(--line);
        text-align: center;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(54px, 9vw, 132px);
        line-height: 0.86;
        font-weight: 1000;
        color: #fff;
        text-shadow: 8px 8px 0 #050505;
      }

      .hero-label {
        width: fit-content;
        margin: 26px auto 12px;
        padding: 10px 32px;
        border: 4px solid var(--line);
        background: #fff;
        box-shadow: var(--shadow);
        font-size: clamp(34px, 5vw, 68px);
        line-height: 1;
        font-weight: 1000;
      }

      .hero p {
        margin: 22px auto 34px;
        max-width: 760px;
        color: #fff;
        text-shadow: 2px 2px 0 #050505;
        font-size: 18px;
        line-height: 1.7;
        font-family: "Microsoft YaHei", system-ui, sans-serif;
        font-weight: 800;
      }

      .generator {
        width: min(860px, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 132px;
        gap: 10px;
        border: 4px solid var(--line);
        background: #fff;
        box-shadow: var(--shadow);
        padding: 10px;
        text-align: left;
      }

      .generator textarea {
        width: 100%;
        min-height: 136px;
        resize: vertical;
        border: 2px solid var(--line);
        background: #f7f7f7;
        color: var(--ink);
        padding: 18px;
        outline: none;
        font-family: "Microsoft YaHei", system-ui, sans-serif;
        font-weight: 700;
        line-height: 1.6;
      }

      .generator-side {
        display: grid;
        gap: 10px;
      }

      .generator-side button {
        width: 100%;
        min-height: 100%;
        flex-direction: column;
      }

      .generator-tools {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 10px;
      }

      .generator-tools button {
        min-height: 38px;
        box-shadow: none;
        border-width: 2px;
        font-size: 13px;
      }

      .section {
        padding: 42px clamp(18px, 4vw, 64px);
      }

      .section-head {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 28px;
        border-bottom: 4px solid var(--line);
        padding-bottom: 14px;
      }

      .section h2 {
        margin: 0;
        font-size: clamp(30px, 4vw, 46px);
        line-height: 1;
        font-weight: 1000;
      }

      .filter-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 28px;
      }

      .filter-row button {
        min-height: 36px;
        border-width: 2px;
        box-shadow: none;
        font-size: 13px;
      }

      .filter-row button.active {
        background: #050505;
        color: #fff;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 34px;
      }

      .prompt-card {
        border: 3px solid var(--line);
        background: #fff;
        box-shadow: var(--shadow);
        overflow: hidden;
        display: grid;
        min-height: 520px;
      }

      .thumb {
        height: 210px;
        border-bottom: 3px solid var(--line);
        position: relative;
        overflow: hidden;
        background:
          linear-gradient(135deg, var(--card-color, #ff616d), #050505);
      }

      .thumb::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, transparent 45%, rgba(0,0,0,0.46) 100%),
          radial-gradient(circle at 20% 18%, rgba(255,255,255,0.22), transparent 30%);
        z-index: 2;
        pointer-events: none;
      }

      .thumb-art {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      .thumb-frame {
        position: absolute;
        inset: 18px;
        border: 2px solid rgba(255, 255, 255, 0.72);
        z-index: 3;
        pointer-events: none;
      }

      .thumb-title {
        position: absolute;
        left: 20px;
        right: 20px;
        bottom: 20px;
        z-index: 4;
        color: #fff;
        font-size: 30px;
        line-height: 1.03;
        text-shadow: 4px 4px 0 #050505;
        font-weight: 1000;
      }

      .card-body {
        padding: 18px;
        display: grid;
        gap: 14px;
      }

      .meta-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid #d9d5ca;
        padding-bottom: 10px;
        font-size: 13px;
      }

      .meta-line strong {
        font-size: 14px;
      }

      .preview-box {
        border: 2px solid var(--line);
        background: #f7f7f7;
        min-height: 86px;
        padding: 12px;
        font-family: "Microsoft YaHei", system-ui, sans-serif;
        font-size: 13px;
        line-height: 1.55;
        font-weight: 650;
        color: #222;
      }

      .card-actions {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 48px;
        gap: 10px;
        align-items: center;
      }

      .card-actions button {
        width: 100%;
      }

      .share {
        padding: 0;
        font-size: 20px;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(360px, 0.9fr) minmax(0, 1.1fr);
        gap: 28px;
        align-items: start;
      }

      .panel {
        border: 3px solid var(--line);
        background: #fff;
        box-shadow: var(--shadow);
        padding: 22px;
      }

      .panel h3 {
        margin: 0 0 16px;
        font-size: 24px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      label {
        display: grid;
        gap: 7px;
        font-size: 13px;
        font-weight: 950;
      }

      label.wide {
        grid-column: 1 / -1;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 2px solid var(--line);
        background: #fff;
        color: var(--ink);
        min-height: 42px;
        padding: 9px 11px;
        outline: none;
        font-family: "Microsoft YaHei", system-ui, sans-serif;
        font-weight: 700;
      }

      textarea {
        min-height: 98px;
        resize: vertical;
        line-height: 1.55;
      }

      .output textarea {
        min-height: 236px;
      }

      .output textarea.small {
        min-height: 128px;
      }

      .action-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        border: 3px solid var(--line);
        background: var(--yellow);
        box-shadow: var(--shadow-sm);
        padding: 12px 18px;
        font-weight: 950;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease, bottom 0.2s ease;
        z-index: 20;
      }

      .toast.show {
        opacity: 1;
        bottom: 32px;
      }

      @media (max-width: 980px) {
        .cards,
        .workspace {
          grid-template-columns: 1fr;
        }

        .generator {
          grid-template-columns: 1fr;
        }

        .generator-side button {
          min-height: 68px;
        }
      }

      @media (max-width: 640px) {
        .topbar,
        .section-head {
          align-items: stretch;
          flex-direction: column;
        }

        .hero {
          min-height: auto;
          padding-top: 42px;
        }

        .hero h1 {
          font-size: 58px;
          text-shadow: 5px 5px 0 #050505;
        }

        .hero-label {
          font-size: 40px;
          padding-inline: 22px;
        }

        .form-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-mark" aria-hidden="true"></span>
        APIMart Agent
      </a>
      <div class="nav-actions">
        <a class="button" href="/">出图/出视频</a>
        <button id="copyPageButton" type="button">复制当前提示词</button>
      </div>
    </header>

    <section class="hero">
      <h1>SEEDANCE 2.0</h1>
      <div class="hero-label">提示词</div>
      <p>原创营销视频提示词库，每日可扩展。输入一个产品或需求，生成适合 Seedance 2.0 / Wan 2.5 的分镜、节奏、音频和限制词。</p>
      <div class="generator">
        <div>
          <textarea id="quickIdea" placeholder="描述你想生成的视频...（例如：给 GEO AI搜索优化招商做一条 8 秒竖屏爆款广告）">GEO AI搜索优化招商，8秒竖屏，红黄高对比，强卡点，突出首月合作特惠最高50%优惠</textarea>
          <div class="generator-tools">
            <button type="button" data-quick="GEO AI搜索优化招商，8秒竖屏，红黄高对比，强卡点，代理合作优惠">GEO招商</button>
            <button type="button" data-quick="本地生活门店引流，10秒竖屏，突出到店转化和同城曝光">门店引流</button>

          </div>
        </div>
        <div class="generator-side">
          <button id="quickGenerateButton" class="primary" type="button">✦<br />生成</button>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>热门提示词</h2>
        <button id="showAllButton" type="button">查看全部 →</button>
      </div>
      <div id="filterRow" class="filter-row" aria-label="提示词分类"></div>
      <div id="hotCards" class="cards"></div>
    </section>

    <section class="section">

        <h2>提示词工作台</h2>
        <a class="button" href="/">回到出视频 →</a>
      </div>
      <div class="workspace">
        <form id="agentForm" class="panel">
          <h3>结构化生成</h3>
          <div class="form-grid">
            <label>
              产品/服务名称
              <input id="product" value="GEO AI搜索优化代理" />
            </label>
            <label>
              目标用户

            <label>
              视频目标
              <select id="goal">
                <option selected>招商</option>
                <option>获客</option>
                <option>品牌曝光</option>
                <option>转化下单</option>
              </select>
            </label>
            <label>
              时长
              <select id="duration">
                <option value="5">5s</option>
                <option value="8" selected>8s</option>
                <option value="10">10s</option>
                <option value="15">15s</option>
              </select>
            </label>
            <label>
              比例
              <select id="size">
                <option selected>9:16</option>
                <option>16:9</option>
                <option>1:1</option>
                <option>21:9</option>
                <option>adaptive</option>
              </select>
            </label>
            <label>
              模型
              <select id="model">
                <option value="doubao-seedance-2.0" selected>Seedance 2.0</option>
                <option value="wan2.5">Wan 2.5</option>
              </select>
            </label>
            <label>
              风格
              <select id="style">
                <option value="viral" selected>红黄高对比爆款</option>
                <option value="tech">科技数据流</option>
                <option value="ugc">UGC口播</option>
                <option value="product">产品展示</option>
                <option value="cinematic">电影感商业片</option>
              </select>
            </label>
            <label>
              节奏
              <select id="rhythm">
                <option value="beat" selected>强卡点</option>
                <option value="fast">快剪</option>
                <option value="business">稳重商务</option>
                <option value="talking">口播带货</option>
              </select>
            </label>
            <label>
              音频
              <select id="audio">
                <option value="voice" selected>有声旁白</option>
                <option value="bgm">BGM 氛围</option>
                <option value="drum">鼓点卡点</option>
                <option value="silent">无声</option>
              </select>
            </label>
            <label>
              旁白
              <select id="voice">
                <option selected>沉稳有力的中文男声</option>
                <option>清晰利落的中文女声</option>
                <option>快节奏信息流口播</option>
                <option>不需要旁白</option>
              </select>
            </label>
            <label class="wide">
              卖点（每行 1 条）
              <textarea id="benefits">关键词全AI优化
企业品牌快速收录
优质词/竞争词优化</textarea>
            </label>
            <label>
              优惠/利益点
              <input id="offer" value="首月合作特惠，最高50%优惠" />
            </label>
            <label>
              CTA 行动号召
              <input id="cta" value="招募代理 / 个人合作中" />
            </label>
            <label class="wide">
              限制词
              <textarea id="restrictions">不要出现真实可识别真人脸
不要出现具体平台UI侵权画面
核心文字必须清晰可读，不要杂乱小字
不要出现二维码、联系方式、水印或品牌Logo</textarea>
            </label>
          </div>
          <div class="action-row">
            <button id="generateButton" class="primary" type="button">生成提示词</button>
            <button id="resetButton" type="button">清空</button>
          </div>
        </form>

        <div class="panel output">
          <h3>生成结果</h3>
          <label>
            完整分镜版
            <textarea id="fullPrompt" readonly></textarea>
          </label>
          <div class="action-row">
            <button id="copyFullButton" class="yellow" type="button">复制完整提示词</button>
            <button id="writeVideoButton" class="primary" type="button">写入出视频</button>
          </div>
          <label style="margin-top: 18px">
            压缩投喂版
            <textarea id="compactPrompt" class="small" readonly></textarea>
          </label>
          <div class="action-row">
            <button id="copyCompactButton" type="button">复制压缩版</button>
          </div>
          <label style="margin-top: 18px">
            参数建议
            <textarea id="paramAdvice" class="small" readonly></textarea>
          </label>
        </div>
      </div>
    </section>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

        fields.rhythm.value = /稳重|商务/.test(idea) ? "business" : /口播/.test(idea) ? "talking" : /快剪/.test(idea) ? "fast" : "beat";
        fields.style.value = /科技|数据/.test(idea) ? "tech" : /电影/.test(idea) ? "cinematic" : /产品/.test(idea) ? "product" : "viral";
        if (/优惠|折扣|特惠|%/.test(idea)) fields.offer.value = idea.match(/[^，。；;]*(优惠|折扣|特惠|%)[^，。；;]*/)?.[0] || fields.offer.value;
        generatePrompts();
        document.querySelector("#agentForm").scrollIntoView({ behavior: "smooth", block: "start" });
        showToast("已根据需求生成结构化提示词");
      }

      function findBestPreset(text) {
        const rules = [
          [/GEO|AI搜索|招商|代理/, "geo"],
          [/门店|本地|同城|到店|餐饮|美业/, "local"],
          [/SaaS|软件|系统|CRM|工具/, "saas"],
          [/电商|产品|下单|卖点|直播间/, "ecommerce"],
          [/课程|资料|训练营|知识付费/, "course"],
          [/品牌|企业|曝光/, "brand"],
          [/旅行|景点|路线|目的地/, "travel"],
          [/剧情|反转|痛点/, "story"],
          [/AI能力|发布|科技|数据流/, "tech"],
        ];
        const match = rules.find(([pattern]) => pattern.test(text));
        return promptLibrary.find((item) => item.id === (match?.[1] || "geo")) || promptLibrary[0];
      }

      function extractProductName(text, fallback) {
        const cleaned = text.split(/[，,。；;]/)[0]?.trim();
        return cleaned && cleaned.length <= 28 ? cleaned : fallback;
      }

      function generatePrompts() {
        const context = getContext();
        const segments = buildTimelineSegments(context.duration);
        const sceneLines = segments.map((segment, index) => buildSceneLine(segment, index, context));
        const audioPrompt = buildAudioPrompt(context);
        const restrictions = context.restrictions.length ? context.restrictions.join("；") : defaultRestrictions.join("；");

        fields.fullPrompt.value = [
          `请制作一条 ${context.duration} 秒、${context.size} 比例的 ${context.product} ${context.goal} 宣传视频。`,
          `目标用户：${context.audience}。`,
          `核心卖点：${context.benefits.join("；")}。`,
          `优惠/利益点：${context.offer}。`,
          `行动号召：${context.cta}。`,
          "",
          "分镜脚本：",
          ...sceneLines,
          "",
          `画面风格：${styleMap[context.style]}。`,
          `节奏与运镜：${rhythmMap[context.rhythm]}。`,
          `音频：${audioPrompt}。`,
          `限制：${restrictions}。`,
          "整体要求：主体、场景、运动、镜头、美学、风格和音频都要明确；中文核心大字必须清晰可读；信息层级简洁，避免密集小字和侵权界面。",
        ].join("\n");

        fields.compactPrompt.value = [
          `${context.duration}s ${context.size} ${context.product} ${context.goal} 视频，面向${context.audience}。`,
          `卖点：${context.benefits.join("、")}；利益点：${context.offer}；CTA：${context.cta}。`,
          `按 ${segments.map((segment) => `${segment.start}-${segment.end}s`).join(" / ")} 分镜推进：${context.scenes.join("；")}。`,
          `风格：${styleMap[context.style]}。节奏：${rhythmMap[context.rhythm]}。音频：${audioPrompt}。`,
          `限制：${restrictions}。核心中文大字清晰，不要真实可识别真人脸，不要平台侵权UI，不要水印二维码。`,
        ].join("\n");

        fields.paramAdvice.value = [
          `model: ${context.model}`,
          `duration: ${context.duration}`,
          `size: ${context.size}`,
          "resolution: 建议 720p；成本敏感可用 480p，发布级再用 720p。",
          `generate_audio: ${context.audio === "silent" || context.voice === "不需要旁白" ? "false" : "true"}`,
          "参考素材建议：可使用品牌主视觉、产品图、抽象数据流参考图；参考视频需公网可访问，避免清晰真人脸、平台UI、二维码和水印。",
        ].join("\n");
      }

      function getContext() {
        const benefits = splitLines(fields.benefits.value).slice(0, 3);
        const matchingPreset = promptLibrary.find((item) => item.product === fields.product.value.trim()) || activePreset;
        return {
          product: fields.product.value.trim() || matchingPreset.product,
          audience: fields.audience.value.trim() || matchingPreset.audience,
          goal: fields.goal.value,
          duration: Number(fields.duration.value || 8),
          size: fields.size.value,
          model: fields.model.value,
          style: fields.style.value,
          rhythm: fields.rhythm.value,
          audio: fields.audio.value,
          voice: fields.voice.value,
          benefits: benefits.length ? benefits : matchingPreset.benefits,
          offer: fields.offer.value.trim() || matchingPreset.offer,
          cta: fields.cta.value.trim() || matchingPreset.cta,
          scenes: matchingPreset.scenes,
          restrictions: splitLines(fields.restrictions.value),
        };
      }

      function buildTimelineSegments(duration) {
        if (duration <= 5) return [{ start: 0, end: 1.2 }, { start: 1.2, end: 2.6 }, { start: 2.6, end: 4 }, { start: 4, end: duration }];
        if (duration === 8) return [{ start: 0, end: 2 }, { start: 2, end: 4 }, { start: 4, end: 6 }, { start: 6, end: 8 }];
        if (duration === 10) return [{ start: 0, end: 2.5 }, { start: 2.5, end: 5 }, { start: 5, end: 7.5 }, { start: 7.5, end: 10 }];
        return [{ start: 0, end: 3 }, { start: 3, end: 6 }, { start: 6, end: 10 }, { start: 10, end: 15 }];
      }

      function buildSceneLine(segment, index, context) {
        const scene = context.scenes[index] || context.scenes[context.scenes.length - 1];
        const headline = [
          `${new Date().getFullYear()}，${context.product}机会爆发`,
          context.benefits[0] || "核心卖点快速出现",
          context.offer || "合作利益清晰展示",
          context.cta || "立即咨询合作",
        ][index];
        const voiceLine = [
          `${context.product}的新机会正在爆发。`,
          `${context.benefits.join("、")}，全面放大转化入口。`,
          `${context.offer}，现在入局更有优势。`,
          `${context.cta}，抢占增长红利。`,
        ][index];
        return `${formatTime(segment.start)}-${formatTime(segment.end)}秒：${scene}。屏幕核心大字：“${headline}”。辅助文字保持少量、粗体、高对比。旁白：“${voiceLine}”`;
      }

      function buildAudioPrompt(context) {
        return (audioMap[context.audio] || audioMap.voice).replace("{voice}", context.voice);
      }

      function formatTime(value) {
        return Number.isInteger(value) ? String(value) : value.toFixed(1);
      }

      function splitLines(value) {
        return String(value || "")
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter(Boolean);
      }

      async function copyText(text, message) {
        if (!text.trim()) {
          showToast("先生成提示词");
          return;
        }
        await navigator.clipboard.writeText(text);
        showToast(message);
      }

      function writeToVideo() {
        if (!fields.fullPrompt.value.trim()) generatePrompts();
        const payload = {
          prompt: fields.fullPrompt.value.trim(),
          duration: fields.duration.value,
          size: fields.size.value,
          model: fields.model.value,
          generateAudio: !(fields.audio.value === "silent" || fields.voice.value === "不需要旁白"),
        };
        localStorage.setItem("seedancePromptDraft", JSON.stringify(payload));
        showToast("已写入出视频草稿，正在跳转");
        setTimeout(() => {
          window.location.href = "/#video";
        }, 350);
      }

      function resetForm() {
        applyPreset(promptLibrary[0]);
        showToast("已恢复默认模板");
      }

      let toastTimer = null;
      function showToast(message) {
        clearTimeout(toastTimer);
        toast.textContent = message;
        toast.classList.add("show");
        toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
      }
    </script>
  </body>
</html>
